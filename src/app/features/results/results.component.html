<section class="page">
    <div class="page-header">
        <h1>Resultados</h1>
        <p>Acompanhe os sorteios mais recentes do sistema.</p>
    </div>

    <div class="highlight-card">
        <div class="highlight-header">
            <h2>Último sorteio</h2>
            <span>{{ ultimoSorteio.data }}</span>
        </div>

        <div class="prize-grid">
            <div class="prize-card" *ngFor="let premio of ultimoSorteio.premios; let i = index">
                <small>{{ i + 1 }}º prêmio</small>
                <strong>{{ premio }}</strong>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h2>Histórico de resultados</h2>
            <p>Veja os sorteios anteriores registrados.</p>
        </div>

        <div class="history-list">
            <div class="history-item" *ngFor="let resultado of historicoResultados">
                <div class="history-top">
                    <strong>{{ resultado.data }}</strong>
                </div>

                <div class="history-prizes">
                    <div class="mini-prize" *ngFor="let premio of resultado.premios; let i = index">
                        <small>{{ i + 1 }}º</small>
                        <span>{{ premio }}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
