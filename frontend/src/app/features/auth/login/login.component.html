<div class="auth-page">
    <div class="auth-card">
        <h1>Entrar</h1>
        <p class="subtitle">Acesse sua conta no BichoFull</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input id="email" type="email" formControlName="email" placeholder="seuemail@gmail.com" />
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input id="senha" type="password" formControlName="senha" placeholder="Digite sua senha" />
            </div>

            <button type="submit" class="auth-button">Entrar</button>
        </form>

        <p class="auth-footer">Ainda não tem conta? Cadastre-se.</p>
    </div>
</div>
