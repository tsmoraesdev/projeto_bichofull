services:
  db:
    image: mysql:8.0
    container_name: bichofull_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bichofull
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/geral.sql:/docker-entrypoint-initdb.d/01-geral.sql:ro
      - ./database/animais.sql:/docker-entrypoint-initdb.d/02-animais.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bichofull_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/bichofull?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8080
      JWT_SECRET: ACESSO_CHAVE_TESTE_PROJETO_BICHOFULL_2026
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bichofull_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "4200:4200"

volumes:
  mysql_data:
